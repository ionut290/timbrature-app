<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="container">
      <h1>Timbrature Aziendali</h1>
      <div class="card" id="userBox"></div>

      <div class="card">
        <h2>Nuova timbratura / giornata</h2>

        <div class="actions punch-actions">
          <button id="clockInBtn" class="clock-in" type="button" onclick="clockIn()">Entrata</button>
          <button id="clockOutBtn" class="clock-out" type="button" onclick="clockOut()" disabled>Uscita</button>
        </div>

        <div class="grid">
          <label for="data">Data
            <input type="date" id="data">
          </label>

          <label for="entrata">Entrata
            <input type="time" id="entrata">
          </label>

          <label for="uscita">Uscita
            <input type="time" id="uscita">
          </label>

          <label for="pausa">Pausa (minuti)
            <input type="number" id="pausa" min="0" value="0">
          </label>

          <label for="causale">Causale
            <select id="causale"></select>
          </label>

          <label for="note">Note
            <textarea id="note" rows="3" placeholder="Aggiungi dettagli se necessario"></textarea>
          </label>
        </div>

        <div class="actions">
          <button id="saveDraftBtn" class="secondary" type="button" onclick="saveRecord('BOZZA')">Salva bozza</button>
          <button id="sendBtn" type="button" onclick="saveRecord('INVIATO')">Invia al responsabile</button>
        </div>

        <p id="esito" class="msg" role="status" aria-live="polite"></p>
      </div>

      <div class="card">
        <h2>Storico mese</h2>
        <div class="inline-actions">
          <input type="month" id="mese">
          <button id="reloadMonthBtn" type="button" onclick="loadMyMonth()">Ricarica</button>
        </div>
        <div class="table-wrap">
          <table class="responsive-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Entrata</th>
                <th>Uscita</th>
                <th>Pausa</th>
                <th>Causale</th>
                <th>Ore</th>
                <th>Ordinarie</th>
                <th>Straordinario</th>
                <th>Stato</th>
              </tr>
            </thead>
            <tbody id="myRows"></tbody>
          </table>
        </div>
      </div>

      <div class="card" id="detailBox" hidden>
        <h2>Dettaglio timbratura</h2>
        <div id="detailRows" class="detail-list"></div>
        <div class="actions">
          <button type="button" class="secondary" onclick="goBackToDashboard()">Torna allo storico</button>
        </div>
      </div>

      <div class="card" id="managerBox" hidden>
        <h2>Approvazioni (responsabile/admin)</h2>
        <div class="table-wrap">
          <table class="responsive-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Dipendente</th>
                <th>Causale</th>
                <th>Ore</th>
                <th>Stato</th>
                <th>Azioni</th>
              </tr>
            </thead>
            <tbody id="pendingRows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      window.APP_CONFIG = {
        recordId: <?!= JSON.stringify(recordId || '') ?>
      };
    </script>
    <?!= include('Scripts'); ?>
  </body>
</html>
