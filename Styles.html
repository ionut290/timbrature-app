<style>
  :root {
    --bg: #f3f6fb;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #475569;
    --line: #dbe2ea;
    --primary: #4f46e5;
    --primary-hover: #3730a3;
    --secondary: #0f766e;
    --ok-bg: #ecfdf3;
    --ok-text: #166534;
    --err-bg: #fef2f2;
    --err-text: #b91c1c;
    --info-bg: #eff6ff;
    --info-text: #1e40af;
    --hero-a: #312e81;
    --hero-b: #7c3aed;
    --hero-c: #db2777;
    --surface-a: #ffffff;
    --surface-b: #f8fafc;
    --focus: rgba(79, 70, 229, 0.34);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 0 0, #c4b5fd 0, rgba(196, 181, 253, 0) 40%),
      radial-gradient(circle at 100% 0, #f9a8d4 0, rgba(249, 168, 212, 0) 35%),
      linear-gradient(180deg, #f5f3ff 0%, #eff6ff 45%, #f8fafc 100%);
    color: var(--text);
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.45;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px;
  }

  .hero {
    border-radius: 20px;
    margin: 6px 0 14px;
    padding: 18px 18px 16px;
    background: linear-gradient(135deg, var(--hero-a), var(--hero-b) 55%, var(--hero-c));
    color: #fff;
    box-shadow: 0 14px 28px rgba(49, 46, 129, 0.25);
  }

  .hero-kicker {
    margin: 0 0 4px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.9;
  }

  h1 {
    margin: 0;
    font-size: 1.45rem;
    line-height: 1.2;
  }

  .hero-subtitle {
    margin: 8px 0 0;
    color: rgba(255, 255, 255, 0.92);
    font-size: 0.95rem;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 1.05rem;
  }

  .card {
    background: linear-gradient(180deg, var(--surface-a), var(--surface-b));
    border: 1px solid #d8e2ef;
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
  }

  #userBox {
    background: linear-gradient(120deg, #0ea5e9, #4f46e5);
    color: #fff;
    border-color: transparent;
    font-weight: 600;
  }

  .card-gradient {
    border-color: #c7d2fe;
    background:
      radial-gradient(circle at 90% -20%, rgba(167, 139, 250, 0.18), rgba(167, 139, 250, 0) 50%),
      linear-gradient(180deg, #ffffff, #eef2ff);
  }

  .card-detail {
    border-color: #fbcfe8;
    background:
      radial-gradient(circle at 0 -40%, rgba(244, 114, 182, 0.18), rgba(244, 114, 182, 0) 52%),
      linear-gradient(180deg, #fff, #fdf2f8);
  }

  .card-manager {
    border-color: #99f6e4;
    background:
      radial-gradient(circle at 100% -25%, rgba(45, 212, 191, 0.22), rgba(45, 212, 191, 0) 52%),
      linear-gradient(180deg, #fff, #f0fdfa);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  label {
    display: grid;
    gap: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #1f2937;
  }

  input,
  select,
  textarea,
  button {
    width: 100%;
    min-height: 50px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 16px;
  }

  textarea {
    min-height: 88px;
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus,
  button:focus {
    outline: 2px solid var(--focus);
    outline-offset: 1px;
  }

  button {
    cursor: pointer;
    border: none;
    background: linear-gradient(180deg, #6366f1, var(--primary-hover));
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.1px;
    transition: transform 0.05s ease, filter 0.15s ease, opacity 0.15s ease;
  }

  button:hover:not(:disabled) {
    filter: brightness(1.04);
  }

  button:active:not(:disabled) {
    transform: translateY(1px);
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  button.secondary {
    background: linear-gradient(180deg, #14b8a6, #0f766e);
  }

  .actions {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .punch-actions {
    margin-top: 0;
    margin-bottom: 12px;
  }

  .clock-in {
    background: linear-gradient(180deg, #22c55e, #15803d);
  }

  .clock-out {
    background: linear-gradient(180deg, #fb7185, #e11d48);
  }

  .inline-actions {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
  }

  .table-wrap {
    overflow-x: auto;
    margin-top: 8px;
    border: 1px solid var(--line);
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }

  th,
  td {
    border-bottom: 1px solid #e5eaf1;
    padding: 10px;
    font-size: 13px;
    text-align: left;
    vertical-align: top;
    white-space: nowrap;
  }

  th {
    background: linear-gradient(180deg, #ede9fe, #e0e7ff);
    font-weight: 700;
    color: #312e81;
  }

  .actions-cell {
    display: flex;
    gap: 8px;
  }

  .actions-cell button {
    min-height: 42px;
    padding: 10px 12px;
  }

  .msg {
    min-height: 44px;
    margin: 12px 0 0;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid transparent;
    font-weight: 600;
    display: flex;
    align-items: center;
  }

  .msg.ok {
    background: var(--ok-bg);
    border-color: #bbf7d0;
    color: var(--ok-text);
  }

  .msg.err {
    background: var(--err-bg);
    border-color: #fecaca;
    color: var(--err-text);
  }

  .msg.info {
    background: var(--info-bg);
    border-color: #bfdbfe;
    color: var(--info-text);
  }

  .history-link {
    color: #4338ca;
    font-weight: 700;
    text-decoration: none;
  }

  .history-link:hover {
    text-decoration: underline;
  }

  .detail-list {
    display: grid;
    gap: 8px;
  }

  .detail-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 8px;
    border-bottom: 1px solid #e5eaf1;
    padding-bottom: 8px;
  }

  .detail-row strong {
    color: #7c2d92;
  }

  @media (max-width: 780px) {
    .container {
      padding: 10px;
    }

    h1 {
      font-size: 1.22rem;
    }

    .hero {
      padding: 14px;
      border-radius: 16px;
    }

    .grid,
    .actions,
    .inline-actions {
      grid-template-columns: 1fr;
    }

    .card {
      padding: 12px;
      border-radius: 14px;
    }

    th,
    td {
      font-size: 12px;
    }

    .detail-row {
      grid-template-columns: 1fr;
      gap: 4px;
    }
  }
</style>
