<script>
  let currentUser = null;
  let hasClockInForToday = false;
  let pendingRequests = 0;
  function getInitialRecordId() {
    return (window.APP_CONFIG && window.APP_CONFIG.recordId) || '';
  }

  function id(x) { return document.getElementById(x); }

  function nowDateISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function nowTimeHHMM() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  }

  function showMsg(message, type = 'ok') {
    const esito = id('esito');
    if (!esito) return;
    esito.className = `msg ${type}`;
    esito.textContent = message || '';
  }

  function setLoading(isLoading, message = 'Caricamento in corso...') {
    pendingRequests = Math.max(0, pendingRequests + (isLoading ? 1 : -1));
    const loading = pendingRequests > 0;

    document.querySelectorAll('button').forEach((btn) => {
      if (loading) {
        btn.dataset.prevDisabled = btn.disabled ? '1' : '0';
        btn.disabled = true;
      } else {
        const prev = btn.dataset.prevDisabled;
        if (prev === '0') btn.disabled = false;
        delete btn.dataset.prevDisabled;
      }
    });

    if (loading) showMsg(message, 'info');
  }

  function setPunchButtons(inProgress) {
    hasClockInForToday = !!inProgress;
    const inBtn = id('clockInBtn');
    const outBtn = id('clockOutBtn');
    if (!inBtn || !outBtn) return;

    inBtn.disabled = hasClockInForToday;
    outBtn.disabled = !hasClockInForToday;
  }

  function setUserBox(user) {
    id('userBox').innerHTML = `<strong>${user.nome}</strong> (${user.ruolo}) - ${user.email}`;
  }

  function initCausali(causali) {
    id('causale').innerHTML = causali
      .map((c) => `<option value="${c.codice}">${c.codice} - ${c.descrizione}</option>`)
      .join('');
  }

  function collectPayload(stato) {
    return {
      data: id('data').value,
      entrata: id('entrata').value,
      uscita: id('uscita').value,
      pausaMinuti: id('pausa').value,
      causale: id('causale').value,
      note: id('note').value,
      stato
    };
  }

  function loadDashboard() {
    setLoading(true, 'Caricamento dashboard...');

    google.script.run
      .withSuccessHandler((res) => {
        currentUser = res.user;
        setUserBox(res.user);
        id('data').value = res.today;
        initCausali(res.causali);

        const now = new Date();
        id('mese').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        if (['responsabile', 'admin'].includes(res.user.ruolo)) {
          id('managerBox').hidden = false;
        }

        loadMyMonth((rows) => detectTodayPunchState(rows));
        if (!id('managerBox').hidden) loadPending();

        showMsg('Dashboard aggiornata.', 'ok');
        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .getDashboard();
  }

  function saveRecord(stato, onDone) {
    const actionLabel = stato === 'INVIATO' ? 'Invio in corso...' : 'Salvataggio in corso...';
    setLoading(true, actionLabel);

    google.script.run
      .withSuccessHandler((res) => {
        showMsg(`Salvato. Ore: ${res.calcolo.worked}, Ordinarie: ${res.calcolo.ord}, Straordinario: ${res.calcolo.stra}`, 'ok');
        loadMyMonth((rows) => detectTodayPunchState(rows));
        if (!id('managerBox').hidden) loadPending();
        if (typeof onDone === 'function') onDone(res);
        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .createOrUpdateDay(collectPayload(stato));
  }

  function loadMyMonth(onDone) {
    const month = id('mese').value;
    if (!month) return;

    setLoading(true, 'Aggiornamento storico...');

    google.script.run
      .withSuccessHandler((rows) => {
        id('myRows').innerHTML = rows.map((r) => `
          <tr>
            <td data-label="Giorno">${r.data || ''}</td>
            <td data-label="Timbrature">
              <a class="history-link" href="${buildDetailUrl(r.id)}">
                ${(r.entrata || '--:--')} - ${(r.uscita || '--:--')}
              </a>
            </td>
          </tr>`).join('');

        if (typeof onDone === 'function') onDone(rows);
        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .getMyMonthData(month);
  }

  function buildDetailUrl(recordId) {
    const base = `${window.location.origin}${window.location.pathname}`;
    return `${base}?recordId=${encodeURIComponent(recordId)}`;
  }

  function loadRecordDetail(recordId) {
    if (!recordId) return;
    setLoading(true, 'Caricamento dettaglio timbratura...');

    google.script.run
      .withSuccessHandler((record) => {
        renderRecordDetail(record);
        showDetailPage(true);
        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .getMyRecordDetail(recordId);
  }

  function renderRecordDetail(record) {
    const values = [
      ['Data', record.data],
      ['Dipendente', record.nomeDipendente],
      ['Email dipendente', record.emailDipendente],
      ['Entrata', record.entrata || '-'],
      ['Uscita', record.uscita || '-'],
      ['Pausa minuti', record.pausa || 0],
      ['Causale', record.causale || '-'],
      ['Note', record.note || '-'],
      ['Ore lavorate', record.ore || 0],
      ['Ore ordinarie', record.ord || 0],
      ['Ore straordinario', record.stra || 0],
      ['Stato', record.stato || '-'],
      ['Responsabile', record.responsabileEmail || '-'],
      ['Creato il', record.creatoIl || '-'],
      ['Aggiornato il', record.aggiornatoIl || '-'],
      ['Approvato da', record.approvatoDa || '-'],
      ['Approvato il', record.approvatoIl || '-'],
      ['Motivo rifiuto', record.motivoRifiuto || '-']
    ];

    id('detailRows').innerHTML = values.map(([label, value]) => `
      <div class="detail-row">
        <strong>${label}</strong>
        <span>${value}</span>
      </div>
    `).join('');
  }

  function showDetailPage(visible) {
    const detailVisible = !!visible;
    id('detailBox').hidden = !detailVisible;
    id('managerBox').hidden = detailVisible || !['responsabile', 'admin'].includes(currentUser?.ruolo || '');
    document.querySelectorAll('.container > .card').forEach((card) => {
      if (card.id === 'detailBox') return;
      card.hidden = detailVisible;
    });
  }

  function goBackToDashboard() {
    window.location.href = `${window.location.origin}${window.location.pathname}`;
  }

  function detectTodayPunchState(rows) {
    const list = Array.isArray(rows) ? rows : [];
    const today = id('data').value || nowDateISO();
    const todayRow = list.find((r) => String(r.data || '') === today);

    id('entrata').value = todayRow?.entrata || '';
    id('uscita').value = todayRow?.uscita || '';

    setPunchButtons(Boolean(todayRow?.entrata && !todayRow?.uscita));
  }

  function clockIn() {
    id('data').value = nowDateISO();
    id('entrata').value = nowTimeHHMM();
    id('uscita').value = '';
    setPunchButtons(true);
    saveRecord('BOZZA');
  }

  function clockOut() {
    if (!hasClockInForToday) {
      showMsg('Prima premi Entrata.', 'err');
      return;
    }

    id('uscita').value = nowTimeHHMM();
    saveRecord('INVIATO', () => setPunchButtons(false));
  }

  function loadPending() {
    const month = id('mese').value;
    if (!month) return;

    setLoading(true, 'Caricamento approvazioni...');

    google.script.run
      .withSuccessHandler((rows) => {
        id('pendingRows').innerHTML = rows.map((r) => `
          <tr>
            <td data-label="Data">${r.data}</td>
            <td data-label="Dipendente">${r.dipendente}</td>
            <td data-label="Causale">${r.causale}</td>
            <td data-label="Ore">${r.ore}</td>
            <td data-label="Stato">${r.stato}</td>
            <td data-label="Azioni" class="actions-cell">
              <button type="button" onclick="approve('${r.id}', true)">Approva</button>
              <button type="button" class="secondary" onclick="approve('${r.id}', false)">Rifiuta</button>
            </td>
          </tr>`).join('');

        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .getPendingForManager(month);
  }

  function approve(idRecord, approved) {
    let motivo = '';
    if (!approved) {
      motivo = prompt('Motivo rifiuto:', 'Dati non corretti') || 'Rifiutato';
    }

    setLoading(true, approved ? 'Approvazione in corso...' : 'Rifiuto in corso...');

    google.script.run
      .withSuccessHandler(() => {
        showMsg('Operazione completata.', 'ok');
        loadPending();
        loadMyMonth();
        setLoading(false);
      })
      .withFailureHandler((e) => {
        showMsg(e.message || String(e), 'err');
        setLoading(false);
      })
      .approveRecord(idRecord, approved, motivo);
  }

  window.onload = () => {
    id('data').value = nowDateISO();
    setPunchButtons(false);
    const initialRecordId = getInitialRecordId();
    if (initialRecordId) {
      loadRecordDetail(initialRecordId);
      return;
    }
    loadDashboard();
  };
</script>
